<DOCTYPE html>
<html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMWYG</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
 </head>

<body>

    <div id="dealer-section">
              <img id="dealer-avatar" src="dealer-idle.svg">
    </div>
  <div class="table">
    <div id="dealer">

      <div id="dealer-cards"></div>
      <div id="dealer-score"></div>
    </div>

    <div id="game-message"></div>
    <div id="intro-controls">
    <button id="next-intro">Next</button>
    <button id="start-game" style="display:none;">Play Now</button>
    </div>


    <div id="player">
      <div id="player-cards"></div>
        <div id="player-score"></div>
    </div>

    <div class="controls">
      <button id="hit">Hit</button>
      <button id="stand">Stand</button>
      <button id="play-again">Play Again</button>
    </div>

    <p id="message"></p>
  </div>

  <script src="bj-test.js"></script>
</body>
